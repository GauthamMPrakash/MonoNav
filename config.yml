# Directory Settings
save_dir_prefix: 'data/mononav-'
# Camera Settings
camera_source: 'esp32-cam'                                   # used for naming files
camera_calibration_path: 'utils/calibration/intrinsics.json' # camera calibration file (for undistortion)
# Set to False to bypass undistort/crop transformation on incoming frames
enable_undistort: False
#camera_ip: 'http://10.42.0.29:81/stream'                    # camera stream URL (otherwise enter integer for camera index)   
camera_ip: 'http://192.168.53.56:81/stream'

# Depth Model Settings
num_pre_depth_frames: 3       # how many times to run the depth model before starting (the first few inferences are much slower)
INPUT_SIZE: 252               # Multiple of 14. Scales the image by INPUT_SIZE/smaller image dimension
DA2_CHECKPOINT: "DepthAnythingV2-metric/checkpoints/depth_anything_v2_metric_hypersim_vits.pth" # path to checkpoint for DepthAnythingV2, make sure it matches the encoder you choose
DA2_ENABLE_AUTOCAST: False     # Use mixed precision for inference when supported (recommended on CUDA)
DA2_AUTOCAST_DTYPE: "float16" # "float16" or "bfloat16"
DA2_USE_HALF_MODEL: False     # Convert model weights to FP16 on CUDA (faster, but can be less stable)
DA2_CHANNELS_LAST: False       # Enable NHWC tensor layout on CUDA for faster convolutions
DA2_FAST_RESIZE: False         # Use faster resize interpolation in pre-processing

enable_vbg : True             # Enable VoxelBlockGrid (TSDF fusion) - only for AP_ObstacleAvoidnace
save_during_flight : False     # Whether to save images and reconstructions during flight (slows down the loop, but allows you to see the reconstruction quality on the actual flight data)

# Reconstruction settings
filterYvals: True             # this helps filter out the ground / ceiling (for planar navigation)
filterWeights: True           # this helps filter out low-weight voxels
filterTSDF: True
weight_threshold: 4           # determine the weight threshold for filtering (higher threshold -> fewer points)
VoxelBlockGrid:
  depth_scale: 1000.0         # 1000.0 is default (mm to m), scale factor for depth values during integration
  depth_max: 7.0             # max depth to include in the reconstruction
  trunc_voxel_multiplier: 8.0
  device: None                # "CUDA:0" (faster) or "CPU:0". None for auto-selection (Only selects the first CPU or GPU instance)

# Planning Settings
trajlib_dir: "utils/trajlib/" # where to save & retrieve the trajectory library (motion primitives)
planner_type: "mononav"   # "mononav" or "bendyruler"

# Direct depth-image BendyRuler settings
depth_bendy_lookahead_m: 2.0      # tuned from min_dist2obs=0.7 -> ~3x clearance horizon
depth_bendy_safety_margin_m: 0.9  # slightly above min_dist2obs to account for depth noise
depth_bendy_bearing_inc_deg: 5.0
depth_bendy_max_bearing_deg: 60.0 # closer to AP default behavior, avoids extreme side turns
depth_bendy_row_frac_lo: 0.25     # ignore more of the ceiling / upper clutter
depth_bendy_row_frac_hi: 0.75     # ignore more of the floor for planar flight
depth_bendy_bendy_ratio: 1.5
depth_bendy_bendy_angle: 60.0
depth_bendy_clearance_percentile: 15

# Short-lived obstacle memory for depth_bendyruler.
# Keeps recent depth obstacles for a short time after they leave the image.
depth_bendy_memory_enable: True
depth_bendy_memory_timeout_s: 1  # short persistence at forward_speed=0.5 m/s
depth_bendy_memory_stride_px: 12   # denser obstacle sampling without being too heavy
depth_bendy_memory_max_points: 1200
depth_bendy_memory_max_depth_m: 3.0

# Goal position in RDF frame (metres). 
# Comment out for undirected exploration.
goal_position_rdf: # from EKF origin
  - 2.5 # Right
  - -1.3   # Down
  - 4   # Forward

min_dist2obs: 0.7             # minimum acceptable distance from obstacles, meters (for primitive selection)
min_dist2goal: 1.0            # termination condition for reaching the goal, meters

# Drone Settings
# --------------
# radio_uri: 'radio://0/4/2M/E7E7E7E7E7' # update the drone ID# to match your vehicle, check using cfclient

# IP and port of the telemetry module on the drone. Set appropriate connection strings.
# Replace with serial port name (ex: 'COM9') if using serial telemetry on the PC
#IP: "udpout:10.42.0.110:14550" 
IP: "udpout:192.168.53.51:14550" 
baud: 115200               # Set baud, only required for serial telemetry
height: 1.0                # flight altitude, meters
EKF_LAT: 8.4723591
EKF_LON: 76.9295203
forward_speed: 0.5         # forward speed in m/s, set to None to use speed defined in generate_primitives.py
# Control gain settings (YOU MAY NEED TO TUNE THIS YOURSELF)
yvel_gain: 0.0           # yvel =  yawrate*yvel_gain  <- for providing sideways velocity so that turns can be made sharper. Increase for faster turns.
yawrate_gain: 2          # yawrate = yawrate*yawrate_gain

FLY_VEHICLE: False        # whether to actually fly the drone