# Directory Settings
save_dir_prefix: 'data/mononav-'
trajlib_dir: "utils/trajlib/" # where to save & retrieve the trajectory library (motion primitives)

# Camera Settings
camera_calibration_path: 'utils/calibration/intrinsics.json' # camera calibration file (for undistortion)
# Set to False to bypass undistort/crop transformation on incoming frames
enable_undistort: True
#camera_ip: 'http://10.42.0.29:81/stream'                    # camera stream URL (otherwise enter integer for camera index)   
camera_ip: 'http://192.168.53.56:81/stream'

# Depth Model Settings
INPUT_SIZE: 252               # Multiple of 14. Scales the image by INPUT_SIZE/smaller image dimension
DA2_CHECKPOINT: "DepthAnythingV2-metric/checkpoints/depth_anything_v2_metric_hypersim_vits.pth" # path to checkpoint for DepthAnythingV2, make sure it matches the encoder you choose
MODEL_MAX_DEPTH: 20           # maximum depth (in meters) that the depth dataset can predict. Hypersim is 20 m.

enable_vbg : True             # Enable VoxelBlockGrid (TSDF fusion) - only for AP_ObstacleAvoidnace
save_during_flight : True    # Whether to save images and reconstructions during flight (slows down the loop, but allows you to see the reconstruction quality on the actual flight data)

# Reconstruction settings
filterYvals: True             # this helps filter out the ground / ceiling (for planar navigation)
filterWeights: True           # this helps filter out low-weight voxels
filterTSDF: True
weight_threshold: 3           # determine the weight threshold for filtering (higher threshold -> fewer points)
realtime_vbg_display: True    # Enable live VBG point cloud display while flying
realtime_vbg_interval: 2  # update visualization every N frames (tradeoff between compute and responsiveness)
realtime_vbg_downsample_voxel_size: null  # optional downsample for displayed cloud (set to null to disable)
VoxelBlockGrid:
  depth_scale: 1000.0         # 1000.0 is default (mm to m), scale factor for depth values during integration
  depth_max: 7.0              # max depth to include in the reconstruction
  trunc_voxel_multiplier: 8.0
  device: None                # "CUDA:0" (faster) or "CPU:0". None for auto-selection (Only selects the first CPU or GPU instance)

# Goal position in RDF frame (metres). 
# Comment out for undirected exploration.
goal_position_rdf: # from EKF origin
  - 1 # Right
  - -1.3   # Down
  - 7     # Forward

min_dist2obs: 1.0             # minimum acceptable distance from obstacles, meters (for primitive selection)
min_dist2goal: 1.0            # termination condition for reaching the goal, meters

# Drone Settings
# --------------
# radio_uri: 'radio://0/4/2M/E7E7E7E7E7' # update the drone ID# to match your vehicle, check using cfclient

# IP and port of the telemetry module on the drone. Set appropriate connection strings.
# Replace with serial port name (ex: 'COM9') if using serial telemetry on the PC
#IP: "udpout:10.42.0.110:14550" 
IP: "udpout:192.168.53.51:14550" 
baud: 115200               # Set baud, only required for serial telemetry
height: 1.2                # flight altitude, meters
EKF_LAT: 8.4723591
EKF_LON: 76.9295203
forward_speed: 0.5         # forward speed in m/s, set to None to use speed defined in generate_primitives.py
# Control gain settings (YOU MAY NEED TO TUNE THIS YOURSELF)
yvel_gain: 0             # yvel =  yawrate*yvel_gain  <- for providing sideways velocity so that turns can be made sharper. Increase for faster turns.
yawrate_gain: 1.5        # yawrate = yawrate*yawrate_gain

FLY_VEHICLE: True        # whether to actually fly the drone

# Planner settings (optional)
# --------------------------
# Greedy goal-seeking can get stuck in local minima when the goal is occluded by walls.
# This adds a simple "escape/boundary-following" mode that activates when goal distance
# stops improving for a few decision steps.
GreedyEscapePlanner:
  enabled: False
  progress_eps_m: 0.25
  stagnation_steps: 4
  escape_min_steps: 6 # how many times planner stays in esape mode before giving up and returning control to greedy planner.
  # Conservative mapping policy: reject trajectories that pass through unknown space.
  # "Known" means voxels observed with weight > weight_threshold.
  unknown_is_unsafe: True
  # Maximum distance (m) from each trajectory sample to known space.
  known_space_radius_m: 0.25
